name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: python -m pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ann:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container health
        run: |
          docker run -d --name ann_ci -p 8501:8501 ann:ci
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8501/_stcore/health | grep -q ok; then
              echo "Streamlit is healthy"; exit 0
            fi
            sleep 2
          done
          echo "Container did not become healthy in time"; docker logs ann_ci; exit 1
