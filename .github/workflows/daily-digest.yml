name: Daily digest

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

concurrency:
  group: daily-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate provider secret
        env:
          ANN_MODEL_PROVIDER: ${{ vars.ANN_MODEL_PROVIDER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          provider="${ANN_MODEL_PROVIDER:-anthropic}"
          provider="$(printf '%s' "$provider" | tr '[:upper:]' '[:lower:]' | xargs)"
          case "$provider" in
            ""|"anthropic")
              test -n "${ANTHROPIC_API_KEY:-}" || {
                echo "ANTHROPIC_API_KEY secret is required for ANN_MODEL_PROVIDER=anthropic."
                exit 1
              }
              ;;
            "openai")
              test -n "${OPENAI_API_KEY:-}" || {
                echo "OPENAI_API_KEY secret is required for ANN_MODEL_PROVIDER=openai."
                exit 1
              }
              ;;
            *)
              echo "Unsupported ANN_MODEL_PROVIDER: $provider"
              exit 1
              ;;
          esac

      - name: Generate today's digest
        env:
          ANN_MODEL_PROVIDER: ${{ vars.ANN_MODEL_PROVIDER }}
          ANN_MODEL: ${{ vars.ANN_MODEL }}
          ANN_EXTRA_OUTLETS: ${{ vars.ANN_EXTRA_OUTLETS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python ann.py run

      - name: Commit and push digest
        run: |
          set -euo pipefail
          git config user.name "ann-bot"
          git config user.email "ann-bot@users.noreply.github.com"
          git add headlines-*.md README.md
          if git diff --cached --quiet; then
            echo "No digest changes to commit."
            exit 0
          fi
          today="$(date -u +%F)"
          git commit -m "chore(digest): headlines for ${today} [skip ci]"
          git push
